<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxel Terrain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      font: 13px/1.6 monospace;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      user-select: none;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font: 16px/2 sans-serif;
      cursor: pointer;
    }
    #overlay h1 { font-size: 28px; margin-bottom: 8px; }
    #overlay.hidden { display: none; }

    /* Touch controls — shown only on touch devices via .touch class on body */
    #touch-controls { display: none; }
    .touch-hint     { display: none; }
    body.touch #touch-controls { display: block; }
    body.touch .desktop-only   { display: none; }
    body.touch .touch-hint     { display: block; }

    #touch-stick {
      position: absolute;
      bottom: 32px;
      left: 32px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.25);
      touch-action: none;
      user-select: none;
    }
    #touch-stick-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 2px solid rgba(255,255,255,0.6);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .touch-btn {
      position: absolute;
      right: 32px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.35);
      color: #fff;
      font: 24px/1 sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      user-select: none;
    }
    .touch-btn.active { background: rgba(255,255,255,0.35); }
    #touch-up   { bottom: 116px; }
    #touch-down { bottom: 32px; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="crosshair"></div>
  <div id="overlay">
    <h1>Voxel Terrain</h1>
    <p>Tap to start flying</p>
    <p class="desktop-only" style="font-size:13px;opacity:0.7">WASD — move &nbsp;|&nbsp; Mouse — look &nbsp;|&nbsp; Space/Shift — up/down &nbsp;|&nbsp; Scroll — speed &nbsp;|&nbsp; [ ] — render distance</p>
    <p class="touch-hint" style="font-size:13px;opacity:0.7">Joystick — move &nbsp;|&nbsp; Drag — look &nbsp;|&nbsp; ▲▼ — up/down</p>
  </div>
  <div id="touch-controls">
    <div id="touch-stick"><div id="touch-stick-knob"></div></div>
    <div id="touch-up"   class="touch-btn">▲</div>
    <div id="touch-down" class="touch-btn">▼</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
