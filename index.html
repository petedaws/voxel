<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Voxel Terrain</title>
  <script>
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #000;
      overflow: hidden;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }
    button { font: inherit; }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      user-select: none;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      font: 13px/1.6 monospace;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      user-select: none;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

    #mobile-controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
    }
    #move-joystick {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.28);
      pointer-events: auto;
      touch-action: none;
      backdrop-filter: blur(2px);
    }
    #move-joystick-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(255,255,255,0.45);
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,0.58);
    }
    #overlay.hidden { display: none; }
    .menu-modal {
      position: relative;
      width: min(460px, calc(100vw - 32px));
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(17,21,24,0.94);
      box-shadow: 0 22px 60px rgba(0,0,0,0.45);
      padding: 24px;
    }
    .menu-modal h1 {
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 6px;
      letter-spacing: 0;
    }
    .menu-modal p {
      color: rgba(255,255,255,0.72);
      line-height: 1.45;
      margin-bottom: 18px;
    }
    .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 6px;
      color: rgba(255,255,255,0.78);
      background: transparent;
      cursor: pointer;
    }
    .modal-close:hover,
    .modal-close:focus-visible {
      background: rgba(255,255,255,0.10);
      color: #fff;
      outline: none;
    }
    .control-list {
      display: grid;
      gap: 8px;
      margin: 18px 0 22px;
      color: rgba(255,255,255,0.86);
      font-size: 14px;
    }
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 30px;
    }
    .control-row span:last-child {
      color: rgba(255,255,255,0.62);
      text-align: right;
    }
    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 7px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.10);
      color: #fff;
      font: 12px/1 monospace;
    }
    .primary-action {
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 6px;
      background: #f1f5f2;
      color: #111518;
      cursor: pointer;
      font-weight: 700;
    }
    .primary-action:hover,
    .primary-action:focus-visible {
      background: #fff;
      outline: 2px solid rgba(255,255,255,0.35);
      outline-offset: 2px;
    }
    @media (pointer: coarse) {
      #mobile-controls { display: block; }
      #crosshair { display: none; }
      .desktop-only { display: none; }
      .menu-modal { padding: 22px; }
    }
    @media (pointer: fine) {
      .mobile-only { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="crosshair"></div>

  <div id="mobile-controls" aria-hidden="true">
    <div id="move-joystick">
      <div id="move-joystick-knob"></div>
    </div>
  </div>

  <div id="overlay" role="dialog" aria-modal="true" aria-labelledby="menu-title">
    <div class="menu-modal">
      <button id="overlay-close" class="modal-close" type="button" aria-label="Close menu">X</button>
      <h1 id="menu-title">Voxel Terrain</h1>
      <p>Walk the world, break and place blocks. The terrain is solid — you can't pass through it.</p>
      <div class="control-list" aria-label="Controls">
        <div class="control-row desktop-only"><span><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd></span><span>Move</span></div>
        <div class="control-row desktop-only"><span><kbd>Mouse</kbd></span><span>Look</span></div>
        <div class="control-row desktop-only"><span><kbd>Space</kbd></span><span>Jump / fly up</span></div>
        <div class="control-row desktop-only"><span><kbd>Shift</kbd></span><span>Fly down</span></div>
        <div class="control-row desktop-only"><span><kbd>F</kbd></span><span>Toggle walk / fly</span></div>
        <div class="control-row desktop-only"><span><kbd>L-click</kbd></span><span>Break block</span></div>
        <div class="control-row desktop-only"><span><kbd>R-click</kbd></span><span>Place block</span></div>
        <div class="control-row desktop-only"><span><kbd>Wheel</kbd> / <kbd>1</kbd>-<kbd>5</kbd></span><span>Select block</span></div>
        <div class="control-row desktop-only"><span><kbd>[</kbd> <kbd>]</kbd></span><span>Render distance</span></div>
        <div class="control-row mobile-only"><span><kbd>Left pad</kbd></span><span>Move</span></div>
        <div class="control-row mobile-only"><span><kbd>Drag</kbd></span><span>Look</span></div>
      </div>
      <button id="overlay-start" class="primary-action" type="button">Start</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
