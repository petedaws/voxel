<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxel Terrain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      font: 13px/1.6 monospace;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      user-select: none;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font: 16px/2 sans-serif;
      cursor: pointer;
    }
    #overlay h1 { font-size: 28px; margin-bottom: 8px; }
    #overlay.hidden { display: none; }

    #mobile-controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
    }
    #move-joystick {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.28);
      pointer-events: auto;
      touch-action: none;
      backdrop-filter: blur(2px);
    }
    #move-joystick-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(255,255,255,0.45);
      pointer-events: none;
    }
    @media (pointer: coarse) {
      #mobile-controls { display: block; }
      #crosshair { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="crosshair"></div>

  <div id="mobile-controls" aria-hidden="true">
    <div id="move-joystick">
      <div id="move-joystick-knob"></div>
    </div>
  </div>

  <div id="overlay">
    <h1>Voxel Terrain</h1>
    <p>Tap & drag to look</p>
    <p style="font-size:13px;opacity:0.7">Desktop: WASD + mouse + scroll + [ ] &nbsp;|&nbsp; Mobile: left joystick move, drag anywhere to look</p>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
